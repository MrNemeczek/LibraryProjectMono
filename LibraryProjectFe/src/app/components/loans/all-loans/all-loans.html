<p-toast />
<p-confirmdialog />

<div class="loans-page">
  <h1>Wszystkie wypożyczenia</h1>

  <p-card>
    <div class="toolbar">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-user" />
        <input
          pInputText
          type="text"
          [(ngModel)]="readerNameFilter"
          (input)="onFiltersChange()"
          placeholder="Imię i nazwisko czytelnika"
          class="filter-input"
        />
      </p-iconfield>

      <p-iconfield>
        <p-inputicon styleClass="pi pi-hashtag" />
        <input
          pInputText
          type="text"
          [(ngModel)]="bookCopyInventoryNumberFilter"
          (input)="onFiltersChange()"
          placeholder="Nr egzemplarza"
          class="filter-input"
        />
      </p-iconfield>

      <p-button severity="secondary" label="Wyczyść" (click)="clearFilters()" />
    </div>

    <p-table
      [value]="loans"
      [paginator]="true"
      [lazy]="true"
      [first]="(page - 1) * pageSize"
      [rows]="pageSize"
      [totalRecords]="totalCount"
      (onPage)="onPageChange($event)"
      [loading]="loading"
      [rowsPerPageOptions]="[10, 20, 50]"
      dataKey="id"
      styleClass="p-datatable-striped"
    >
      <ng-template #header>
        <tr>
          <th>Czytelnik</th>
          <th>Nr egzemplarza</th>
          <th>Data wypożyczenia</th>
          <th>Data zwrotu</th>
          <th>Status</th>
          <th style="width: 100px">Akcje</th>
        </tr>
      </ng-template>
      <ng-template #body let-loan>
        <tr>
          <td>{{ getReaderName(loan) }}</td>
          <td>{{ loan.bookCopyInventoryNumber }}</td>
          <td>{{ loan.loanDate }}</td>
          <td>{{ loan.returnDate || '-' }}</td>
          <td>
            <p-tag
              [value]="getStatusLabel(loan.status)"
              [severity]="getStatusSeverity(loan.status)"
            />
          </td>
          <td>
            @if (loan.status === 'Active' || loan.status === 'Overdue') {
              <p-button
                icon="pi pi-undo"
                severity="success"
                size="small"
                (click)="confirmReturn(loan.id)"
                pTooltip="Zwróć książkę"
              />
            }
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="6" class="text-center">Brak wypożyczeń.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
